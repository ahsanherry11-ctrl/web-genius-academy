<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Web Genius Academy</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="shortcut icon" href="../favicon.svg">
    <link rel="apple-touch-icon" href="../logo.png">
    <meta name="theme-color" content="#10b981">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { display:flex; justify-content:center; align-items:center; min-height:100vh; background:var(--bg-color); }
        .auth-box { background:var(--card-bg); padding:3rem; border-radius:20px; box-shadow:var(--shadow-lg); width:100%; max-width:450px; }
        .auth-box h2 { text-align:center; color:var(--primary-color); margin-bottom:2rem; font-size:2rem; }
        .form-group { margin-bottom:1.5rem; }
        .form-group label { display:block; margin-bottom:0.5rem; font-weight:600; color:var(--text-primary); }
        .form-group input { width:100%; padding:1rem 1.5rem; border-radius:12px; border:2px solid rgba(5,150,105,0.2); background:var(--bg-color); color:var(--text-primary); font-size:1rem; transition:var(--transition-fast); outline:none; }
        .form-group input:focus { border-color:var(--primary-color); box-shadow:0 0 0 4px rgba(5,150,105,0.1); }
        .cta-btn { width:100%; justify-content:center; }
        .auth-links { text-align:center; margin-top:1.5rem; color:var(--text-secondary); }
        .auth-links a { color:var(--primary-color); text-decoration:none; font-weight:600; transition:var(--transition-fast); }
        .auth-links a:hover { color:var(--primary-dark); }
    </style>
</head>
<body>
    <div class="auth-box">
        <h2><i class="fas fa-sign-in-alt"></i> Welcome Back</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="cta-btn"><i class="fas fa-sign-in-alt"></i> Login</button>
        </form>
        <div class="auth-links">
            <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
            <p><a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Home</a></p>
        </div>
    </div>
    <!-- ✅ FIXED: Correct path for pages folder -->
    <script src="../js/app.js"></script>
</body>
</html>
